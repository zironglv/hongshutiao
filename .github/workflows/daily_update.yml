name: 红薯条日报更新

on:
  schedule:
    # 每个工作日早上 7:00 (北京时间)
    - cron: '0 23 * * 0-4'  # UTC 23:00 = 北京时间 7:00
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 执行数据采集和分析
        run: |
          python src/main.py
      
      - name: 提交更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 更新日报数据 - $(date '+%Y-%m-%d')"
          git push
      
      - name: 发送钉钉通知
        run: |
          curl -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "text", 
              "text": {
                "content": "靑枫_QwQ\n🍠 红薯条日报已更新！\n时间: '"$(date '+%Y-%m-%d %H:%M')"'\n查看: https://zironglv.github.io/hongshutiao/"
              }
            }'