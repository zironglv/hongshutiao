<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红利指数日报</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-page: #ffffff;
            --bg-secondary: #f7f6f3;
            --bg-hover: #efefef;
            --bg-callout: #f7f6f3;
            --text-primary: #37352f;
            --text-secondary: #787774;
            --text-gray: #9b9a97;
            --border-light: #e9e9e7;
            --border-medium: #d3d1c7;
            --accent-blue: #2383e2;
            --accent-green: #0f7b6c;
            --accent-yellow: #d9730d;
            --accent-red: #e03e3e;
            --accent-purple: #9065b0;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", Monaco, "Inconsolata", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            font-size: 16px;
        }

        .page { max-width: 900px; margin: 0 auto; padding: 80px 96px; }
        @media (max-width: 768px) { .page { padding: 40px 24px; } }

        .page-icon { font-size: 78px; margin-bottom: 16px; user-select: none; }
        .page-title { font-size: 40px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
        .page-desc { font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }

        .update-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-secondary); border-radius: 4px; font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
        .divider { height: 1px; background: var(--border-light); margin: 24px 0; }

        .block-title { font-size: 24px; font-weight: 600; margin: 32px 0 16px 0; display: flex; align-items: center; gap: 8px; }

        .callout { display: flex; gap: 12px; padding: 16px; background: var(--bg-callout); border-radius: 4px; margin: 16px 0; }
        .callout-icon { font-size: 20px; flex-shrink: 0; }
        .callout-content { flex: 1; }

        .sentiment-box { background: linear-gradient(90deg, rgba(15, 123, 108, 0.08) 0%, rgba(15, 123, 108, 0.02) 100%); }
        .sentiment-score { font-size: 32px; font-weight: 700; color: var(--accent-green); }
        .sentiment-label { font-size: 14px; padding: 2px 8px; background: rgba(15, 123, 108, 0.15); color: var(--accent-green); border-radius: 4px; margin-left: 8px; }
        .sentiment-bar { width: 100%; height: 6px; background: var(--border-light); border-radius: 3px; margin-top: 12px; }
        .sentiment-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

        .table-wrap { margin: 16px 0; overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { padding: 8px 12px; text-align: left; font-weight: 500; color: var(--text-secondary); border-bottom: 1px solid var(--border-medium); }
        .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--bg-hover); }

        .yield-val { font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--accent-blue); }
        .code-val { font-family: var(--font-mono); font-size: 13px; color: var(--text-gray); }
        .perc-val { font-family: var(--font-mono); font-size: 14px; }
        .perc-low { color: var(--accent-green); }
        .perc-mid { color: var(--text-primary); }
        .perc-high { color: var(--accent-yellow); }

        .tag { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 13px; font-weight: 500; }
        .tag-good { background: rgba(15, 123, 108, 0.12); color: var(--accent-green); }
        .tag-mid { background: rgba(35, 131, 226, 0.12); color: var(--accent-blue); }
        .tag-warn { background: rgba(217, 115, 13, 0.12); color: var(--accent-yellow); }

        /* Tab 切换 */
        .tab-group { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn { padding: 8px 16px; background: var(--bg-secondary); border: none; border-radius: 4px; font-size: 14px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background: var(--bg-hover); }
        .tab-btn.active { background: var(--accent-blue); color: white; }

        .chart-box { margin: 24px 0; padding: 20px; background: var(--bg-secondary); border-radius: 4px; }
        .chart-wrap { height: 320px; }

        /* 指数选择器 */
        .index-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .index-btn { padding: 6px 12px; background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: 4px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .index-btn:hover { background: var(--bg-hover); border-color: var(--border-medium); }
        .index-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        .insight-list { margin: 16px 0; }
        .insight-item { display: flex; gap: 8px; padding: 8px 0; font-size: 15px; }
        .insight-dot { width: 6px; height: 6px; background: var(--text-primary); border-radius: 50%; margin-top: 7px; flex-shrink: 0; }

        .disclaimer { margin: 48px 0 24px 0; padding: 16px; background: rgba(224, 62, 62, 0.06); border-radius: 4px; border: 1px solid rgba(224, 62, 62, 0.15); }
        .disclaimer-title { color: var(--accent-red); font-size: 14px; margin-bottom: 8px; }
        .disclaimer-text { color: var(--text-secondary); font-size: 14px; }

        .footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border-light); text-align: center; color: var(--text-gray); font-size: 14px; }
        .footer a { color: var(--text-secondary); text-decoration: none; margin: 0 12px; }
        .footer a:hover { color: var(--accent-blue); }

        .loading { color: var(--text-gray); text-align: center; padding: 20px; }
        .error { color: var(--accent-red); text-align: center; padding: 20px; }
        .hint { font-size: 13px; color: var(--text-gray); margin-top: 12px; }

        /* 历史变化指示 */
        .change-indicator { font-size: 12px; margin-left: 8px; }
        .change-up { color: var(--accent-green); }
        .change-down { color: var(--accent-red); }
        .change-neutral { color: var(--text-gray); }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-icon">📊</div>
        <h1 class="page-title">红利指数日报</h1>
        <p class="page-desc">每日股息率追踪，记录红利投资数据</p>
        
        <div class="update-badge" id="updateBadge">📅 加载中...</div>
        <div class="divider"></div>
        
        <!-- 情绪热度 -->
        <h2 class="block-title">🌡️ 市场情绪热度</h2>
        <div class="callout sentiment-box">
            <span class="callout-icon">📈</span>
            <div class="callout-content">
                <div>
                    <span class="sentiment-score" id="sentScore">--</span>
                    <span class="sentiment-label" id="sentLabel">计算中</span>
                </div>
                <div class="sentiment-bar"><div class="sentiment-fill" id="sentFill"></div></div>
                <p style="margin-top:8px;font-size:14px;color:var(--text-secondary)" id="sentDesc">综合分析指数分位数位置</p>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <!-- 今日数据 -->
        <h2 class="block-title">📉 今日股息率数据</h2>
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>指数名称</th>
                        <th>代码</th>
                        <th>股息率</th>
                        <th>分位数</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <p class="hint">💡 分位数低 = 股息率偏高（股价相对便宜）｜点击代码可在东方财富查询详情</p>
        
        <div class="divider"></div>
        
        <!-- Tab 切换：今日对比 / 历史趋势 -->
        <h2 class="block-title">📈 数据可视化</h2>
        
        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('today')">今日对比</button>
            <button class="tab-btn" onclick="switchTab('history')">近15日趋势</button>
        </div>
        
        <!-- 指数选择器 -->
        <div class="index-selector" id="indexSelector"></div>
        
        <div class="chart-box">
            <div class="chart-wrap">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <!-- 今日资讯 -->
        <h2 class="block-title">💡 今日资讯</h2>
        <div class="insight-list" id="insightList">
            <div class="loading">加载中...</div>
        </div>
        
        <!-- 免责声明 -->
        <div class="disclaimer">
            <div class="disclaimer-title">⚠️ 重要提示</div>
            <div class="disclaimer-text">以上内容仅为数据记录，不构成投资建议。投资有风险，入市需谨慎。</div>
        </div>
        
        <div class="footer">
            <a href="https://github.com/zironglv/hongshutiao">GitHub</a>
            <span>红利指数日报</span>
        </div>
    </div>
    
    <script>
        const COLORS = ['#2383e2', '#0f7b6c', '#d9730d', '#9065b0', '#e03e3e', '#d44c9d'];
        const INDEX_ORDER = ['沪港深红利低波', '红利低波100', '红利低波', '300红利低波', '东证红利低波', '上红低波'];
        
        let currentTab = 'today';
        let selectedIndices = [];
        let allIndices = [];
        let historyData = {};
        let myChart = null;

        // 加载数据
        async function load() {
            try {
                // 加载今日数据
                const res1 = await fetch('data/latest.json');
                const data = await res1.json();
                
                // 加载历史数据
                const res2 = await fetch('data/data_20260330.json');
                const history = await res2.json();
                
                renderPage(data, history);
            } catch (e) {
                console.error(e);
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="5" class="error">数据加载失败: ${e.message}</td></tr>`;
            }
        }

        function renderPage(data, history) {
            // 更新日期
            document.getElementById('updateBadge').textContent = '📅 ' + (data.date || '未知');
            
            allIndices = data.indices || [];
            
            // 情绪热度
            const sentiment = calcSentiment(allIndices);
            document.getElementById('sentScore').textContent = sentiment.score;
            document.getElementById('sentLabel').textContent = sentiment.label;
            document.getElementById('sentFill').style.width = sentiment.score + '%';
            document.getElementById('sentFill').style.background = sentiment.color;
            document.getElementById('sentDesc').textContent = sentiment.desc;
            
            // 处理历史数据
            if (history.indices) {
                history.indices.forEach(idx => {
                    historyData[idx.code] = idx;
                });
            }
            
            // 渲染表格（带代码）
            renderTable(allIndices);
            
            // 渲染指数选择器
            renderIndexSelector(allIndices);
            
            // 渲染资讯
            renderInsights(data.insights || []);
            
            // 渲染图表
            renderChart();
        }

        function calcSentiment(indices) {
            let avgPerc = 0;
            indices.forEach(i => avgPerc += i.percentile);
            avgPerc = indices.length ? avgPerc / indices.length : 50;
            
            const score = Math.round(100 - avgPerc);
            
            let label, color, desc;
            if (score >= 70) { label='🔥偏热'; color='var(--accent-green)'; desc='整体分位数偏低，值得关注'; }
            else if (score >= 50) { label='🟡中性'; color='var(--accent-blue)'; desc='多空交织，按需配置'; }
            else if (score >= 30) { label='🟠偏冷'; color='var(--accent-yellow)'; desc='分位数偏高，暂观望'; }
            else { label='❄️冷清'; color='var(--accent-red)'; desc='分位数很高，不建议入场'; }
            
            return { score, label, color, desc };
        }

        function renderTable(indices) {
            const sorted = [...indices].sort((a,b) => INDEX_ORDER.indexOf(a.name) - INDEX_ORDER.indexOf(b.name));
            
            document.getElementById('tableBody').innerHTML = sorted.map(i => {
                // 查找历史数据计算变化
                const hist = historyData[i.code];
                let change = '';
                if (hist && hist.history_dp2 && hist.history_dp2.length >= 2) {
                    const todayVal = hist.history_dp2[hist.history_dp2.length - 1];
                    const prevVal = hist.history_dp2[hist.history_dp2.length - 2];
                    const diff = todayVal - prevVal;
                    if (diff > 0.01) change = `<span class="change-indicator change-up">↑${diff.toFixed(2)}</span>`;
                    else if (diff < -0.01) change = `<span class="change-indicator change-down">↓${Math.abs(diff).toFixed(2)}</span>`;
                    else change = `<span class="change-indicator change-neutral">→</span>`;
                }
                
                const pClass = i.percentile < 30 ? 'perc-low' : i.percentile < 60 ? 'perc-mid' : 'perc-high';
                const tClass = i.percentile < 30 ? 'tag-good' : i.percentile < 60 ? 'tag-mid' : 'tag-warn';
                const tText = i.percentile < 30 ? '🟢值得关注' : i.percentile < 60 ? '🟡中性' : '🟠观望';
                
                // 东方财富链接
                const efUrl = `https://quote.eastmoney.com/concept/${i.code}.html`;
                
                return `
                    <tr>
                        <td><strong>${i.name}</strong></td>
                        <td><a href="${efUrl}" target="_blank" class="code-val" title="点击查看详情">${i.code}</a></td>
                        <td><span class="yield-val">${i.yield}%</span>${change}</td>
                        <td><span class="perc-val ${pClass}">${i.percentile}%</span></td>
                        <td><span class="tag ${tClass}">${tText}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function renderIndexSelector(indices) {
            const sorted = [...indices].sort((a,b) => INDEX_ORDER.indexOf(a.name) - INDEX_ORDER.indexOf(b.name));
            
            // 默认选中前3个
            selectedIndices = sorted.slice(0, 3).map(i => i.code);
            
            document.getElementById('indexSelector').innerHTML = sorted.map((i, idx) => `
                <button class="index-btn ${idx < 3 ? 'active' : ''}" 
                        data-code="${i.code}" 
                        onclick="toggleIndex('${i.code}')">
                    ${i.name}
                </button>
            `).join('');
        }

        function toggleIndex(code) {
            const idx = selectedIndices.indexOf(code);
            if (idx > -1) {
                selectedIndices.splice(idx, 1);
            } else {
                selectedIndices.push(code);
            }
            
            // 更新按钮状态
            document.querySelectorAll('.index-btn').forEach(btn => {
                btn.classList.toggle('active', selectedIndices.includes(btn.dataset.code));
            });
            
            renderChart();
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(tab === 'today' ? '今日' : '趋势'));
            });
            
            renderChart();
        }

        function renderInsights(insights) {
            if (!insights.length) {
                document.getElementById('insightList').innerHTML = '<p style="color:var(--text-gray)">今日暂无重要资讯</p>';
                return;
            }
            
            document.getElementById('insightList').innerHTML = insights.slice(0, 5).map(i => `
                <div class="insight-item">
                    <span class="insight-dot"></span>
                    <span>${i.insight || i.title || ''}</span>
                </div>
            `).join('');
        }

        function renderChart() {
            if (myChart) myChart.destroy();
            
            const ctx = document.getElementById('mainChart');
            
            if (currentTab === 'today') {
                // 今日对比柱状图
                const selected = allIndices.filter(i => selectedIndices.includes(i.code));
                
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: selected.map(i => i.name),
                        datasets: [{
                            label: '股息率 (%)',
                            data: selected.map(i => i.yield),
                            backgroundColor: selected.map((_, idx) => COLORS[idx] + '80'),
                            borderColor: selected.map((_, idx) => COLORS[idx]),
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + '%' } }
                        },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#787774' } },
                            y: { 
                                grid: { color: '#e9e9e7' }, 
                                ticks: { color: '#9b9a97', callback: v => v + '%' },
                                min: 4, max: 6
                            }
                        }
                    }
                });
            } else {
                // 近15日趋势折线图
                const datasets = [];
                let colorIdx = 0;
                
                allIndices.forEach(i => {
                    if (!selectedIndices.includes(i.code)) return;
                    
                    const hist = historyData[i.code];
                    if (!hist || !hist.history_dp2) return;
                    
                    // 取最近15天数据
                    const recent15 = hist.history_dp2.slice(-15);
                    
                    datasets.push({
                        label: i.name,
                        data: recent15,
                        borderColor: COLORS[colorIdx],
                        backgroundColor: COLORS[colorIdx] + '20',
                        tension: 0.3,
                        fill: false,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    });
                    colorIdx++;
                });
                
                // 生成日期标签（倒推15天）
                const labels = [];
                for (let d = 15; d >= 1; d--) {
                    const date = new Date();
                    date.setDate(date.getDate() - d);
                    labels.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
                }
                
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#787774', usePointStyle: true, padding: 16 }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + '%' }
                            }
                        },
                        scales: {
                            x: { grid: { color: '#e9e9e7' }, ticks: { color: '#9b9a97' } },
                            y: { 
                                grid: { color: '#e9e9e7' }, 
                                ticks: { color: '#9b9a97', callback: v => v.toFixed(1) + '%' },
                                min: 4.2, max: 5.6
                            }
                        },
                        interaction: { mode: 'index', intersect: false }
                    }
                });
            }
        }

        // 初始化
        load();
    </script>
</body>
</html>
