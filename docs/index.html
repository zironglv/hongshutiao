<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红利指数日报</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* Notion 风格配色 */
        :root {
            --bg-page: #ffffff;
            --bg-secondary: #f7f6f3;
            --bg-hover: #efefef;
            --bg-callout: #f7f6f3;
            --text-primary: #37352f;
            --text-secondary: #787774;
            --text-gray: #9b9a97;
            --border-light: #e9e9e7;
            --border-medium: #d3d1c7;
            --accent-blue: #2383e2;
            --accent-green: #0f7b6c;
            --accent-yellow: #d9730d;
            --accent-red: #e03e3e;
            --accent-purple: #9065b0;
            --accent-pink: #d44c9d;
            --accent-orange: #df7218;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", "Monaco", "Inconsolata", "Fira Mono", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            font-size: 16px;
        }

        /* Notion 页面布局 */
        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 96px;
        }

        @media (max-width: 768px) {
            .page {
                padding: 40px 24px;
            }
        }

        /* 页面图标和标题 */
        .page-icon {
            font-size: 78px;
            margin-bottom: 16px;
            user-select: none;
        }

        .page-title {
            font-size: 40px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .page-description {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        /* 更新时间 */
        .update-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: 4px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .update-badge::before {
            content: "📅";
        }

        /* 分隔线 */
        .divider {
            height: 1px;
            background: var(--border-light);
            margin: 24px 0;
        }

        /* 区块标题 (Notion heading style) */
        .block-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 32px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-title-icon {
            font-size: 24px;
        }

        /* Callout 区块 (Notion callout style) */
        .callout {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: var(--bg-callout);
            border-radius: 4px;
            margin: 16px 0;
        }

        .callout-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .callout-content {
            flex: 1;
            font-size: 16px;
            color: var(--text-primary);
        }

        /* 情绪热度 (特殊 callout) */
        .sentiment-callout {
            background: linear-gradient(90deg, 
                rgba(15, 123, 108, 0.08) 0%, 
                rgba(15, 123, 108, 0.02) 100%);
        }

        .sentiment-score {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .sentiment-label {
            font-size: 14px;
            padding: 2px 8px;
            background: rgba(15, 123, 108, 0.15);
            color: var(--accent-green);
            border-radius: 4px;
            margin-left: 8px;
        }

        .sentiment-bar {
            width: 100%;
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .sentiment-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* 数据表格 (Notion table style) */
        .table-wrapper {
            margin: 16px 0;
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th {
            padding: 8px 12px;
            text-align: left;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-medium);
            white-space: nowrap;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: var(--bg-hover);
        }

        /* 数值样式 */
        .yield-value {
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .percentile-value {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .percentile-low { color: var(--accent-green); }
        .percentile-medium { color: var(--text-primary); }
        .percentile-high { color: var(--accent-yellow); }

        /* 状态标签 */
        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag-good { 
            background: rgba(15, 123, 108, 0.12); 
            color: var(--accent-green); 
        }
        .tag-neutral { 
            background: rgba(35, 131, 226, 0.12); 
            color: var(--accent-blue); 
        }
        .tag-caution { 
            background: rgba(217, 115, 13, 0.12); 
            color: var(--accent-yellow); 
        }
        .tag-wait { 
            background: rgba(224, 62, 62, 0.12); 
            color: var(--accent-red); 
        }

        /* 观点列表 (Notion bullet style) */
        .insights-list {
            margin: 16px 0;
        }

        .insight-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 0;
            color: var(--text-primary);
            font-size: 15px;
        }

        .insight-bullet {
            width: 6px;
            height: 6px;
            background: var(--text-primary);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 7px;
        }

        .insight-highlight {
            color: var(--accent-blue);
            font-weight: 500;
        }

        /* 图表区块 */
        .chart-block {
            margin: 24px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        .chart-container {
            height: 280px;
        }

        /* 引用区块 (Notion quote style) */
        .quote-block {
            padding: 16px 20px;
            border-left: 3px solid var(--text-primary);
            margin: 16px 0;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* 免责声明 (底部) */
        .disclaimer-block {
            margin: 48px 0 24px 0;
            padding: 16px;
            background: rgba(224, 62, 62, 0.06);
            border-radius: 4px;
            border: 1px solid rgba(224, 62, 62, 0.15);
        }

        .disclaimer-icon {
            color: var(--accent-red);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .disclaimer-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 页脚 */
        .page-footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
            text-align: center;
            color: var(--text-gray);
            font-size: 14px;
        }

        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--accent-blue);
        }

        /* 加载状态 */
        .loading-block {
            display: flex;
            justify-content: center;
            padding: 40px;
            color: var(--text-gray);
        }

        /* 列表页脚 */
        .section-footer {
            font-size: 13px;
            color: var(--text-gray);
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 页面图标 -->
        <div class="page-icon">📊</div>
        
        <!-- 页面标题 -->
        <h1 class="page-title">红利指数日报</h1>
        <p class="page-description">每日股息率追踪，记录红利投资数据</p>
        
        <!-- 更新时间 -->
        <div class="update-badge" id="updateBadge">加载中...</div>
        
        <div class="divider"></div>
        
        <!-- 情绪热度 -->
        <h2 class="block-title">
            <span class="block-title-icon">🌡️</span>
            市场情绪热度
        </h2>
        
        <div class="callout sentiment-callout">
            <span class="callout-icon">📈</span>
            <div class="callout-content">
                <div>
                    <span class="sentiment-score" id="sentimentScore">--</span>
                    <span class="sentiment-label" id="sentimentLabel">计算中</span>
                </div>
                <div class="sentiment-bar">
                    <div class="sentiment-fill" id="sentimentFill" style="width: 50%"></div>
                </div>
                <p style="margin-top: 8px; font-size: 14px; color: var(--text-secondary);" id="sentimentDesc">
                    综合分析指数机会评级与市场资讯
                </p>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <!-- 股息率数据 -->
        <h2 class="block-title">
            <span class="block-title-icon">📉</span>
            今日股息率数据
        </h2>
        
        <div class="table-wrapper">
            <table class="data-table" id="dataTable">
                <thead>
                    <tr>
                        <th>指数名称</th>
                        <th>股息率</th>
                        <th>分位数</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" class="loading-block">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <p class="section-footer">
            💡 分位数表示股息率在历史中的位置：低分位 = 股息率偏高（股价便宜）
        </p>
        
        <div class="divider"></div>
        
        <!-- 今日观点 -->
        <h2 class="block-title">
            <span class="block-title-icon">💡</span>
            今日观点
        </h2>
        
        <div class="insights-list" id="insightsList">
            <div class="loading-block">加载中...</div>
        </div>
        
        <div class="divider"></div>
        
        <!-- 股息率趋势 -->
        <h2 class="block-title">
            <span class="block-title-icon">📈</span>
            股息率趋势
        </h2>
        
        <div class="chart-block">
            <div class="chart-container">
                <canvas id="yieldChart"></canvas>
            </div>
        </div>
        
        <!-- 免责声明 -->
        <div class="disclaimer-block">
            <div class="disclaimer-icon">⚠️ 重要提示</div>
            <div class="disclaimer-text">
                以上内容仅为数据记录和个人心得分享，不构成任何投资建议。
                投资有风险，入市需谨慎。请根据自己的情况做出判断。
            </div>
        </div>
        
        <!-- 页脚 -->
        <div class="page-footer">
            <a href="https://github.com/zironglv/hongshutiao" class="footer-link">GitHub</a>
            <a href="data/latest.json" class="footer-link">数据源</a>
            <span>·</span>
            <span>红利指数日报</span>
        </div>
    </div>
    
    <script>
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/latest.json');
                const data = await response.json();
                renderData(data);
            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="4" style="color: var(--accent-red); text-align: center;">数据加载失败</td></tr>';
            }
        }
        
        // 渲染数据
        function renderData(data) {
            // 更新时间
            document.getElementById('updateBadge').textContent = 
                data.date || '数据加载中...';
            
            // 计算情绪热度
            const sentiment = calculateSentiment(data.indices || []);
            document.getElementById('sentimentScore').textContent = sentiment.score;
            document.getElementById('sentimentLabel').textContent = sentiment.label;
            document.getElementById('sentimentFill').style.width = sentiment.score + '%';
            document.getElementById('sentimentFill').style.background = sentiment.color;
            document.getElementById('sentimentDesc').textContent = sentiment.desc;
            
            // 渲染表格
            renderTable(data.indices || []);
            
            // 渲染观点
            renderInsights(data.news || []);
            
            // 渲染图表
            if (data.history) {
                renderChart(data.history);
            }
        }
        
        // 计算情绪热度
        function calculateSentiment(indices) {
            const scores = { good: 80, fair: 70, neutral: 50, caution: 30, wait: 20 };
            let total = 0;
            
            indices.forEach(idx => {
                total += scores[idx.opportunity] || 50;
            });
            
            const avg = indices.length > 0 ? total / indices.length : 50;
            
            let label, color, desc;
            if (avg >= 70) {
                label = '🔥 偏热';
                color = 'var(--accent-green)';
                desc = '整体分位数偏低，值得关注';
            } else if (avg >= 50) {
                label = '🟡 中性';
                color = 'var(--accent-blue)';
                desc = '多空交织，按需配置';
            } else if (avg >= 30) {
                label = '🟠 偏冷';
                color = 'var(--accent-yellow)';
                desc = '市场观望情绪较浓';
            } else {
                label = '❄️ 冷清';
                color = 'var(--accent-red)';
                desc = '分位数偏高，暂观望';
            }
            
            return { score: Math.round(avg), label, color, desc };
        }
        
        // 渲染表格
        function renderTable(indices) {
            const tbody = document.getElementById('tableBody');
            
            if (!indices.length) {
                tbody.innerHTML = '<tr><td colspan="4">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = indices.map(idx => {
                const percClass = idx.percentile < 30 ? 'percentile-low' :
                                  idx.percentile < 60 ? 'percentile-medium' : 'percentile-high';
                
                const tagClass = {
                    good: 'tag-good',
                    fair: 'tag-good',
                    neutral: 'tag-neutral',
                    caution: 'tag-caution',
                    wait: 'tag-wait'
                }[idx.opportunity] || 'tag-neutral';
                
                const tagText = {
                    good: '🟢 值得关注',
                    fair: '🟢 可关注',
                    neutral: '🟡 中性',
                    caution: '🟠 谨慎',
                    wait: '🔴 观望'
                }[idx.opportunity] || '🟡 中性';
                
                return `
                    <tr>
                        <td><strong>${idx.name}</strong></td>
                        <td><span class="yield-value">${idx.yield}%</span></td>
                        <td><span class="percentile-value ${percClass}">${idx.percentile}%</span></td>
                        <td><span class="status-tag ${tagClass}">${tagText}</span></td>
                    </tr>
                `;
            }).join('');
        }
        
        // 渲染观点
        function renderInsights(news) {
            const list = document.getElementById('insightsList');
            
            if (!news.length) {
                list.innerHTML = '<div class="quote-block">今日暂无重要资讯</div>';
                return;
            }
            
            list.innerHTML = news.slice(0, 5).map(item => `
                <div class="insight-item">
                    <span class="insight-bullet"></span>
                    <span>${item.title || item.summary || '资讯'}</span>
                </div>
            `).join('');
        }
        
        // 渲染图表
        function renderChart(history) {
            const ctx = document.getElementById('yieldChart');
            const labels = history.map(h => h.date.slice(5)); // 只显示月日
            
            const colors = ['#2383e2', '#9065b0', '#0f7b6c', '#d9730d', '#e03e3e', '#d44c9d'];
            const indices = ['300红利低波', '红利低波100', '东证红利低波', '红利低波', '上红低波', '沪港深红利低波'];
            
            const datasets = indices.map((name, i) => ({
                label: name,
                data: history.map(h => {
                    const idx = h.indices?.find(x => x.name === name);
                    return idx?.yield || null;
                }),
                borderColor: colors[i],
                backgroundColor: colors[i] + '20',
                tension: 0.3,
                fill: false,
                pointRadius: 0,
                pointHoverRadius: 4
            })).filter(ds => ds.data.some(v => v !== null));
            
            new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#787774',
                                usePointStyle: true,
                                padding: 16,
                                font: { size: 12 }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#e9e9e7' },
                            ticks: { color: '#9b9a97', font: { size: 11 } }
                        },
                        y: {
                            grid: { color: '#e9e9e7' },
                            ticks: { 
                                color: '#9b9a97',
                                font: { size: 11 },
                                callback: v => v + '%'
                            },
                            min: 3.5,
                            max: 6
                        }
                    }
                }
            });
        }
        
        // 页面加载
        loadData();
    </script>
</body>
</html>
