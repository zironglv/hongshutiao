<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红薯条 - 红利指数监控</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141b33;
            --bg-card: #1a2340;
            --text-primary: #e8ecf4;
            --text-secondary: #8b9cb8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --gradient-main: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%);
            --gradient-card: linear-gradient(180deg, #1a2340 0%, #141b33 100%);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-main);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow-glow);
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .update-time {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 14px;
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }
        
        .update-time::before {
            content: '⏱';
        }
        
        /* 情绪热度卡片 */
        .sentiment-card {
            background: var(--gradient-card);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: var(--shadow-glow);
        }
        
        .sentiment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .sentiment-title {
            font-size: 18px;
            color: var(--text-secondary);
        }
        
        .sentiment-value {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .sentiment-score {
            font-size: 48px;
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sentiment-label {
            font-size: 20px;
            padding: 6px 16px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            color: var(--accent-green);
        }
        
        .sentiment-bar {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .sentiment-fill {
            height: 100%;
            background: var(--gradient-main);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .sentiment-desc {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* 指数卡片网格 */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .index-card {
            background: var(--gradient-card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .index-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.2);
        }
        
        .index-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-main);
        }
        
        .index-card.fair::before { background: var(--accent-green); }
        .index-card.neutral::before { background: var(--accent-cyan); }
        .index-card.caution::before { background: var(--accent-orange); }
        .index-card.wait::before { background: var(--accent-red); }
        
        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .index-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .index-code {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .index-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-fair { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .badge-neutral { background: rgba(6, 182, 212, 0.2); color: var(--accent-cyan); }
        .badge-caution { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .badge-wait { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        
        .index-yield {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .index-yield .value {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .index-percentile {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .percentile-bar {
            width: 100px;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .percentile-fill {
            height: 100%;
            border-radius: 3px;
        }
        
        .percentile-fill.low { background: var(--accent-green); }
        .percentile-fill.medium { background: var(--accent-cyan); }
        .percentile-fill.high { background: var(--accent-orange); }
        .percentile-fill.very-high { background: var(--accent-red); }
        
        .index-suggestion {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* 观点卡片 */
        .insights-section {
            background: var(--gradient-card);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--gradient-main);
            border-radius: 2px;
        }
        
        .insight-item {
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        
        .insight-item:last-child {
            margin-bottom: 0;
        }
        
        .insight-text {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .insight-source {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .insight-source::before {
            content: '🔗';
        }
        
        /* 图表区域 */
        .chart-section {
            background: var(--gradient-card);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .chart-container {
            height: 300px;
            margin-top: 20px;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 14px;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        
        .footer-link {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-link:hover {
            color: var(--accent-blue);
        }
        
        .disclaimer {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 12px;
            color: var(--accent-red);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 28px; }
            .sentiment-score { font-size: 36px; }
            .indices-grid { grid-template-columns: 1fr; }
            .index-yield { font-size: 24px; }
        }
        
        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-secondary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="grid-bg"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">📊</div>
            </div>
            <h1>红薯条 · 红利指数监控</h1>
            <p class="subtitle">每日股息率追踪，助力稳健投资决策</p>
            <div class="update-time" id="updateTime">加载中...</div>
        </header>
        
        <!-- 情绪热度 -->
        <div class="sentiment-card">
            <div class="sentiment-header">
                <span class="sentiment-title">📊 市场情绪热度</span>
                <div class="sentiment-value">
                    <span class="sentiment-score" id="sentimentScore">--</span>
                    <span class="sentiment-label" id="sentimentLabel">计算中</span>
                </div>
            </div>
            <div class="sentiment-bar">
                <div class="sentiment-fill" id="sentimentFill" style="width: 50%"></div>
            </div>
            <p class="sentiment-desc" id="sentimentDesc">综合分析指数机会评级与市场资讯...</p>
        </div>
        
        <!-- 指数卡片 -->
        <div class="indices-grid" id="indicesGrid">
            <div class="loading"><div class="loading-spinner"></div></div>
        </div>
        
        <!-- 今日观点 -->
        <div class="insights-section">
            <h2 class="section-title">💡 今日观点</h2>
            <div id="insightsList">
                <div class="loading"><div class="loading-spinner"></div></div>
            </div>
        </div>
        
        <!-- 股息率趋势图 -->
        <div class="chart-section">
            <h2 class="section-title">📈 股息率趋势</h2>
            <div class="chart-container">
                <canvas id="yieldChart"></canvas>
            </div>
        </div>
        
        <footer>
            <div class="footer-links">
                <a href="https://github.com/zironglv/hongshutiao" class="footer-link">GitHub</a>
                <a href="https://zironglv.github.io/hongshutiao/data/latest.json" class="footer-link">数据源</a>
            </div>
            <div class="disclaimer">
                ⚠️ 以上内容仅供参考，不构成投资建议。投资有风险，入市需谨慎。
            </div>
        </footer>
    </div>
    
    <script>
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/latest.json');
                const data = await response.json();
                renderData(data);
            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('indicesGrid').innerHTML = 
                    '<p style="text-align:center;color:var(--accent-red)">数据加载失败，请稍后刷新</p>';
            }
        }
        
        // 渲染数据
        function renderData(data) {
            // 更新时间
            document.getElementById('updateTime').textContent = 
                data.date || '数据加载中...';
            
            // 计算情绪热度
            const sentiment = calculateSentiment(data.indices || []);
            document.getElementById('sentimentScore').textContent = sentiment.score;
            document.getElementById('sentimentLabel').textContent = sentiment.label;
            document.getElementById('sentimentFill').style.width = sentiment.score + '%';
            document.getElementById('sentimentDesc').textContent = sentiment.desc;
            
            // 渲染指数卡片
            const grid = document.getElementById('indicesGrid');
            if (data.indices && data.indices.length > 0) {
                grid.innerHTML = data.indices.map(idx => createIndexCard(idx)).join('');
            } else {
                grid.innerHTML = '<p style="text-align:center">暂无数据</p>';
            }
            
            // 渲染图表
            if (data.history) {
                renderChart(data.history);
            }
        }
        
        // 计算情绪热度
        function calculateSentiment(indices) {
            const scores = { fair: 80, neutral: 50, caution: 30, wait: 20 };
            let total = 0;
            let counts = { fair: 0, neutral: 0, caution: 0, wait: 0 };
            
            indices.forEach(idx => {
                const opp = idx.opportunity || 'neutral';
                total += scores[opp];
                counts[opp]++;
            });
            
            const avg = indices.length > 0 ? total / indices.length : 50;
            
            let label, desc;
            if (avg >= 70) {
                label = '🔥 偏热';
                desc = '市场关注度高，资金流入明显';
            } else if (avg >= 50) {
                label = '🟡 中性';
                desc = '多空交织，按需配置';
            } else if (avg >= 30) {
                label = '🟠 偏冷';
                desc = '市场观望情绪较浓';
            } else {
                label = '❄️ 冷清';
                desc = '资金流出明显，谨慎观望';
            }
            
            return { score: Math.round(avg), label, desc };
        }
        
        // 创建指数卡片
        function createIndexCard(idx) {
            const percentileClass = 
                idx.percentile < 30 ? 'low' :
                idx.percentile < 60 ? 'medium' :
                idx.percentile < 80 ? 'high' : 'very-high';
            
            const badgeClass = `badge-${idx.opportunity || 'neutral'}`;
            const cardClass = idx.opportunity || 'neutral';
            const badgeText = {
                fair: '🟢 可布局',
                neutral: '🟡 中性',
                caution: '🟠 谨慎',
                wait: '🔴 观望'
            };
            
            return `
                <div class="index-card ${cardClass}">
                    <div class="index-header">
                        <div>
                            <div class="index-name">${idx.name}</div>
                            <div class="index-code">${idx.code}</div>
                        </div>
                        <span class="index-badge ${badgeClass}">${badgeText[idx.opportunity] || '🟡 中性'}</span>
                    </div>
                    <div class="index-yield">
                        <span class="value">${idx.yield}%</span>
                    </div>
                    <div class="index-percentile">
                        <span>历史分位: ${idx.percentile}%</span>
                        <div class="percentile-bar">
                            <div class="percentile-fill ${percentileClass}" style="width: ${idx.percentile}%"></div>
                        </div>
                    </div>
                    <div class="index-suggestion">${idx.suggestion || ''}</div>
                </div>
            `;
        }
        
        // 渲染图表
        function renderChart(history) {
            const ctx = document.getElementById('yieldChart');
            const labels = history.map(h => h.date);
            const datasets = [];
            
            // 为每个指数创建数据线
            const colors = ['#3b82f6', '#8b5cf6', '#06b6d4', '#10b981', '#f59e0b', '#ef4444'];
            const indices = ['300红利低波', '红利低波100', '东证红利低波', '红利低波', '上红低波', '沪港深红利低波'];
            
            indices.forEach((name, i) => {
                const data = history.map(h => {
                    const idx = h.indices?.find(x => x.name === name);
                    return idx?.yield || null;
                });
                
                if (data.some(v => v !== null)) {
                    datasets.push({
                        label: name,
                        data: data,
                        borderColor: colors[i],
                        backgroundColor: colors[i] + '20',
                        tension: 0.4,
                        fill: false
                    });
                }
            });
            
            new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#8b9cb8',
                                usePointStyle: true,
                                padding: 20
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#141b33' },
                            ticks: { color: '#8b9cb8' }
                        },
                        y: {
                            grid: { color: '#141b33' },
                            ticks: { 
                                color: '#8b9cb8',
                                callback: v => v + '%'
                            }
                        }
                    }
                }
            });
        }
        
        // 页面加载完成后执行
        loadData();
    </script>
</body>
</html>
